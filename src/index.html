<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scouting App</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="/main.js" defer></script>
</head>

<body>
  <header class="app-header">
    <h1>4810 Scouting</h1>
  </header>

  <main class="container">
    <section class="card alliance-section">
      <div class="alliance-toggle">
        <span class="label-text red">Red</span>
        <label class="switch">
          <input type="checkbox" id="alliance">
          <span class="slider"></span>
        </label>
        <span class="label-text blue">Blue</span>
      </div>
      
      <div class="input-group">
        <label for="team-num">Team Number</label>
        <input type="number" id="team-num" placeholder="0000" min="0" step="1" inputmode="numeric">
      </div>

      <div class="input-group">
        <label for="match-num">Match Number</label>
        <input type="number" id="match-num" placeholder="0" min="0" step="1" inputmode="numeric"
      </div>
    </section>

    <section class="card">
      <h3>Scoring & Performance</h3>
      <!--<div class="input-group">
        <label>Fuel capacity estimate</label>
        <div class="stepper">
          <button type="button" class="step-btn minus" onclick="this.parentNode.querySelector('input').stepDown()">−</button>
          <input type="number" id="fuel-capacity" placeholder="0" min="0" step="1" inputmode="numeric">
          <button type="button" class="step-btn plus" onclick="this.parentNode.querySelector('input').stepUp()">+</button>
        </div>
      </div>-->
      <div class="input-group">
        <label>Times unloaded into hub</label>
        <div class="stepper">
          <button type="button" class="step-btn minus" onclick="this.parentNode.querySelector('input').stepDown()">−</button>
          <input type="number" id="hub-unloads" placeholder="0" min="0" step="1" inputmode="numeric">
          <button type="button" class="step-btn plus" onclick="this.parentNode.querySelector('input').stepUp()">+</button>
        </div>
      </div>
      <div class="input-group">
        <label>Times intaked from human player</label>
        <div class="stepper">
          <button type="button" class="step-btn minus" onclick="this.parentNode.querySelector('input').stepDown()">−</button>
          <input type="number" id="human-player-deposits" placeholder="0" min="0" step="1" inputmode="numeric">
          <button type="button" class="step-btn plus" onclick="this.parentNode.querySelector('input').stepUp()">+</button>
        </div>
      </div>
      <div class="input-group">
        <div class="label-row" style="display: flex; justify-content: space-between; align-items: center;">
          <label>Shot accuracy</label>
          <span id="accuracy-val" class="badge">1</span>
        </div>
        <input type="range" id="shot-accuracy" min="1" max="10" step="1" class="modern-range" value="1">
      </div>
    </section>

    <section class="card row-logic">
      <div class="checkbox-row">
        <label for="climb">Do they climb?</label>
        <input type="checkbox" id="climb" class="apple-switch">
      </div>

      <div id="climb-level" class="conditional-content">
        <div class="input-grid">
          <label class="check-box-label"><input type="checkbox" id="auton-climb"> Auton?</label>
          <label class="check-box-label"><input type="checkbox" id="endgame-climb"> Endgame?</label>
        </div>
        <div class="input-group mt-10">
          <div class="label-row" style="display: flex; justify-content: space-between; align-items: center;">
            <label>Climb Level</label>
            <span class="badge slider-value">1</span>
          </div>
          <input type="range" id="climb-level-input" min="1" max="3" step="1" class="modern-range" value="1">
        </div>
      </div>
    </section>

    <section class="card row-logic">
      <div class="checkbox-row">
        <label for="defense">Do they play defense?</label>
        <input type="checkbox" id="defense" class="apple-switch">
      </div>

      <div id="defense-level" class="conditional-content">
        <div class="input-group">
          <div class="label-row" style="display: flex; justify-content: space-between; align-items: center;">
            <label>Defensive Rating</label>
            <span class="badge slider-value">1</span>
          </div>
          <input type="range" id="defense-rating" min="1" max="10" step="1" class="modern-range" value="1">
        </div>
        <div class="input-group">
          <label>Other Notes</label>
          <input type="text" id="defense-notes-box" placeholder="Notes on defense here...">
        </div>
      </div>
    </section>

    <section class="card">
      <div class="input-group">
        <label>General Notes</label>
        <textarea placeholder="Notes here..."></textarea>
      </div>
      <button id="save-btn" class="btn-primary">Save & Export Data</button>
      <button id="reset-btn" class="btn-secondary">Clear Form</button>
    </section>
  </main>
</body>
</html>
